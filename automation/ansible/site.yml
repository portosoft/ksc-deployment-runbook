---
- name: Preparar servidor KSC
  hosts: ksc_servers
  become: true
  vars_files:
    - group_vars/ksc_servers.yml

  tasks:
    - name: Configurar Hostname
      ansible.builtin.hostname:
        name: "{{ ksc_hostname }}"

    - name: Instalar pacotes base do sistema
      ansible.builtin.dnf:
        name: "{{ ksc_base_packages }}"
        state: present

    - name: Garantir que o PostgreSQL esteja iniciado e habilitado
      ansible.builtin.systemd:
        name: "{{ postgresql_service_name }}"
        state: started
        enabled: true

    - name: Configurar Firewall para o KSC
      ansible.builtin.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ ksc_firewall_ports }}"
      when: ksc_manage_firewall | bool

    - name: Verificar conformidade de strings no PostgreSQL
      ansible.builtin.command: >
        sudo -u postgres psql -t -c "SHOW standard_conforming_strings;"
      register: pg_strings_status
      changed_when: false

    - name: Alertar se standard_conforming_strings não estiver on
      ansible.builtin.debug:
        msg: "AVISO: standard_conforming_strings está em '{{ pg_strings_status.stdout | trim }}'. Deve ser 'on' para o KSC."
      when: pg_strings_status.stdout | trim != 'on'
