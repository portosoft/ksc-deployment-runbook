name: Create Bot PR
on:
  push:
    branches:
      - trigger-bot-pr
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bot-jules-fix
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --title "🛡️ Sentinel: [HIGH] Fix Local Credential Exposure via Insecure File Permissions" --body "Automated PR creation by bot. Replaces #17 to allow the original author to review and approve." --base main --head bot-jules-fix || true
