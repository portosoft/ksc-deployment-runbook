name: Create Bot PR
on:
  push:
    branches:
      - trigger-bot-pr
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sentinel-fix-local-credential-exposure-17725357227211694878
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --title "🛡️ Sentinel: Enforce secure SSH host key policies and resolve Code Scanning alerts" --body "Automated PR creation by bot. Resolves Code Scanning vulnerabilities for paramiko-missing-host-key-validation." --base main --head sentinel-fix-local-credential-exposure-17725357227211694878 || true
