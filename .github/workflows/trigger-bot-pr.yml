name: Create Bot PR
on:
  push:
    branches:
      - develop
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 10
      - name: Create or update PR develop → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Título: tipo(escopo): resumo do último commit conventional
          LAST_COMMIT=$(git log -1 --pretty="%s")
          PR_TITLE="chore(release): merge develop → main | ${LAST_COMMIT}"

          # Body: extrai bloco [Unreleased] do CHANGELOG se existir
          UNRELEASED=$(awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$UNRELEASED" ]; then
            UNRELEASED="Sem entradas em [Unreleased] no CHANGELOG."
          fi

          PR_BODY="## Tipo de Mudança
          - [x] Nova funcionalidade / Melhoria

          ## Descrição
          Merge automático de \`develop\` para \`main\`.

          ### Mudanças incluídas (CHANGELOG [Unreleased])
          ${UNRELEASED}

          ## Como foi testado?
          - [x] Pipeline CI completo (lint, testes, SAST, secret scanning)

          ## Checklist
          - [x] Segui as diretrizes de contribuição.
          - [x] CHANGELOG.md atualizado.
          - [ ] Testado em servidor Rocky Linux 9 limpo (deploy manual)."

          gh pr create \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}" \
            --base main \
            --head develop \
            || gh pr edit \
                 --base main \
                 $(gh pr list --head develop --base main --json number -q '.[0].number') \
                 --title "${PR_TITLE}" \
                 --body "${PR_BODY}" \
            || true
