name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Markdown Lint
        uses: davidanson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md

  validate-scripts:
    name: Validate Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check Python Syntax
        run: python3 -m py_compile automation/python/env_to_ansible.py

      - name: Check Bash Syntax
        run: bash -n automation/bash/validate-ksc.sh
