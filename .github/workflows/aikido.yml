---
name: Aikido Security Scan

'on':
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

permissions:
  contents: read

jobs:
  aikido-scan:
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install Aikido CI API Client
        run: npm install --global @aikidosec/ci-api-client

      - name: Run Aikido Scan
        run: |
          aikido-api-client scan-release \
            ${{ github.event.repository.name }} \
            ${{ github.sha }} \
            --apikey ${{ secrets.AIKIDO_CLIENT_API_KEY }} \
            --fail-on-sast-scan \
            --fail-on-iac-scan \
            --fail-on-secrets-scan
